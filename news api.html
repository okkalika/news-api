<!DOCTYPE html>
<html>
<head>
<title>News Explorer</title>

<style>
body{
font-family: Arial;
padding:20px;
}

button{
margin:5px;
padding:8px 12px;
cursor:pointer;
}

#news{
margin-top:20px;
}

.article{
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.loader{
font-weight:bold;
color:blue;
}

.error{
color:red;
font-weight:bold;
}
</style>

</head>

<body>

<h1>Tech News</h1>

<p>
<button class="topic" data-topic="AI">AI</button>
<button class="topic" data-topic="javascript">JavaScript</button>
<button class="topic" data-topic="startup">Startup</button>
<button class="topic" data-topic="programming">Programming</button>
</p>

<hr>

<div id="news"></div>

<script>

const newsContainer = document.getElementById("news");
const buttons = document.querySelectorAll(".topic");

async function fetchNews(topic){

newsContainer.innerHTML = "<p class='loader'>Loading news...</p>";

try{

const response = await fetch(`https://hn.algolia.com/api/v1/search?query=${topic}`);

if(!response.ok){
throw new Error("Network response failed");
}

const data = await response.json();

displayNews(data.hits);

}catch(error){

newsContainer.innerHTML =
"<p class='error'>Failed to load news. Please try again.</p>";

}

}

function displayNews(articles){

if(articles.length === 0){
newsContainer.innerHTML = "<p>No news found</p>";
return;
}

newsContainer.innerHTML = "";

articles.slice(0,10).forEach(article => {

const div = document.createElement("div");

div.classList.add("article");

div.innerHTML = `
<h3>${article.title || "No Title Available"}</h3>
<p>Author: ${article.author}</p>
<a href="${article.url}" target="_blank">Read More</a>
`;

newsContainer.appendChild(div);

});

}

buttons.forEach(button => {

button.addEventListener("click", () => {

const topic = button.dataset.topic;

fetchNews(topic);

});

});

</script>

</body>
</html>
